# Tinfoil Container Configuration — vita-model-prod (model enclave)
# Split from vita-agent-prod v0.12.5: this enclave runs ONLY the model (vLLM).
# The app (vita-agent-prod) calls it over attested HTTPS. Identical vLLM container
# + model mpk as v0.12.5 — only the shim changes (fronts vLLM /v1, not the app).

cvm-version: 0.7.5
cpus: 8
memory: 65536
gpus: 1

models:
  - name: "qwen3-6-35b-a3b-claude-4-6-opus-reasoning-distilled"
    repo: "hesamation/Qwen3.6-35B-A3B-Claude-4.6-Opus-Reasoning-Distilled@1b93f96111b5f32711f7d48de619e5c671331283"
    mpk:  "0bcc0d07dd37388a5b2d407ef2f0aa94c57f15b99deba88d44a3028aa7e4bef0_71923912704_22865403-c61b-5cdd-82fe-4f40382a692b"

containers:
  - name: vllm
    image: "vllm/vllm-openai:v0.22.0@sha256:0fec7ec5f3e6bc168e54899935fb0557da908a4832a1dbc88e2debcf2f889416"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    command:
      - "--model"
      - "/tinfoil/mpk/mpk-0bcc0d07dd37388a5b2d407ef2f0aa94c57f15b99deba88d44a3028aa7e4bef0"
      - "--served-model-name"
      - "qwen-opus"
      - "--language-model-only"
      - "--dtype"
      - "bfloat16"
      - "--kv-cache-dtype"
      - "fp8"
      - "--max-model-len"
      - "32768"
      - "--max-num-seqs"
      - "32"
      - "--gpu-memory-utilization"
      - "0.90"
      - "--enable-prefix-caching"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_coder"
      - "--reasoning-parser"
      - "qwen3"
      - "--scheduling-policy"
      - "priority"
      - "--host"
      - "127.0.0.1"
      - "--port"
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 60m

# Shim fronts vLLM's OpenAI-compatible API (NOT an app). The vita-agent enclave
# calls these paths over attested HTTPS.
shim:
  upstream-port: 8080
  paths:
    - /health
    - /v1/models
    - /v1/chat/completions
    - /v1/completions
