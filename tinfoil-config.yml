# Tinfoil Container Configuration — vita-agent model test
# PUBLIC REPO — attestation anchor for an EPHEMERAL test container.
# Serves a model in-enclave on the control.inf6 H200. Delete after testing.

cvm-version: 0.7.5
cpus: 8
memory: 65536
gpus: 1

models:
  - name: "qwable-v1"
    repo: "lordx64/Qwable-v1@ea97e8f7df3f1035959d75dd6e5710a1022938f5"
    mpk:  "3cf1d6e9da3181100fbbc12b1774d6fa13a4b253bb71f576e48eb95b5b5f4511_71923920896_291f501a-4b21-5e35-ac57-63afc66937a1"

containers:
  - name: vllm
    image: "vllm/vllm-openai@sha256:6d8429e38e3747723ca07ee1b17972e09bb9c51c4032b266f24fb1cc3b22ed8f"
    runtime: nvidia
    gpus: all
    ipc: host
    command:
      - "--model"
      - "/tinfoil/mpk/mpk-3cf1d6e9da3181100fbbc12b1774d6fa13a4b253bb71f576e48eb95b5b5f4511"
      - "--served-model-name"
      - "qwable"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--trust-remote-code"
      - "--max-model-len"
