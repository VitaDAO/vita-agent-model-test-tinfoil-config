# vita-model-prod — DEV SHELL: SGLang image idle (sleep), model mounted, debug+SSH.
# Reaches ready instantly so SSH opens; I launch SGLang by hand inside to iterate with logs.
cvm-version: 0.7.5
cpus: 8
memory: 65536
gpus: 1

models:
  - name: "vita-os"
    repo: "vitadao/vita-os@72162b686798ede897dc0e912bddccadd270efac"
    mpk: "4ed77e088faab985da4d99d17366d8fef00cb17a299145edb38d62a0f8bb29d0_71960600576_74d35168-e31d-5737-b7a9-1acd4209b6eb"

containers:
  - name: sglang-dev
    image: "lmsysorg/sglang:v0.5.14-cu129@sha256:885da20811baa77e1c680cad0511d50efbaf94ebe43def9182bdf5290f47dbc5"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    env:
      - SGLANG_ENABLE_SPEC_V2: "1"
    command: ["sleep", "infinity"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      start_period: 20s

shim:
  upstream-port: 8080
  paths:
    - /health
    - /v1/models
    - /v1/chat/completions
    - /v1/completions
