cvm-version: 0.7.5
cpus: 8
memory: 196608
gpus: 1
models:
- name: vita-os
  repo: vitadao/vita-os@72162b686798ede897dc0e912bddccadd270efac
  mpk: 4ed77e088faab985da4d99d17366d8fef00cb17a299145edb38d62a0f8bb29d0_71960600576_74d35168-e31d-5737-b7a9-1acd4209b6eb
containers:
- name: sglang
  image: lmsysorg/sglang:v0.5.14-cu129@sha256:885da20811baa77e1c680cad0511d50efbaf94ebe43def9182bdf5290f47dbc5
  runtime: nvidia
  gpus: all
  ipc: host
  restart: always
  env:
  - HF_HUB_OFFLINE: '1'
  - TRANSFORMERS_OFFLINE: '1'
  - PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  - SGLANG_ENABLE_SPEC_V2: '1'
  command:
  - bash
  - -c
  - "set +e\nmkdir -p /tmp/sglang-crash\necho \"\" | base64 -d > /tmp/reporter.py\nn=0\nwhile true; do\n  n=$((n+1))\n  echo \"[wrapper] starting SGLang (attempt $n)\"\n  python3 -m sglang.launch_server --model-path /tinfoil/mpk/mpk-4ed77e088faab985da4d99d17366d8fef00cb17a299145edb38d62a0f8bb29d0 --served-model-name qwen-opus --reasoning-parser qwen3 --tool-call-parser qwen3_coder --speculative-algorithm NEXTN --speculative-num-steps 3 --speculative-eagle-topk 1 --speculative-num-draft-tokens 4 --max-running-requests 24 --mem-fraction-static 0.85 --context-length 262144 --enable-metrics --crash-dump-folder /tmp/sglang-crash --host 127.0.0.1 --port 8080 2>&1 | tee /tmp/sglang.out\n  C=${PIPESTATUS[0]}\n  echo \"[wrapper] SGLang exited code=$C \u2014 reporting + restarting in 8s\"\n  python3 /tmp/reporter.py \"$C\" || true\n  sleep 8\ndone\n"
  healthcheck:
    test:
    - CMD
    - curl
    - -sf
    - http://localhost:8080/health
    interval: 30s
    timeout: 10s
    start_period: 60m
shim:
  upstream-port: 8080
  paths:
  - /health
  - /v1/models
  - /v1/chat/completions
  - /v1/completions
