# vita-model-prod — DEBUG SHELL: SGLang image, dummy 8080 health server (so enclave reaches
# ready + SSH opens), model mounted. I SSH in and run SGLang by hand on :8081 to read its error.
cvm-version: 0.7.5
cpus: 8
memory: 65536
gpus: 1

models:
  - name: "vita-os"
    repo: "vitadao/vita-os@72162b686798ede897dc0e912bddccadd270efac"
    mpk: "4ed77e088faab985da4d99d17366d8fef00cb17a299145edb38d62a0f8bb29d0_71960600576_74d35168-e31d-5737-b7a9-1acd4209b6eb"

containers:
  - name: sglang-dev
    image: "lmsysorg/sglang:v0.5.14-cu129@sha256:885da20811baa77e1c680cad0511d50efbaf94ebe43def9182bdf5290f47dbc5"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    env:
      - SGLANG_ENABLE_SPEC_V2: "1"
    command:
      - "python3"
      - "-c"
      - "import http.server as h,socketserver as s; H=type('H',(h.BaseHTTPRequestHandler,),{'do_GET':lambda self:[self.send_response(200),self.end_headers(),self.wfile.write(b'ok')],'log_message':lambda self,*a:None}); s.TCPServer(('0.0.0.0',8080),H).serve_forever()"
    healthcheck:
      test: ["CMD", "true"]
      interval: 15s
      timeout: 5s
      start_period: 10s

shim:
  upstream-port: 8080
  paths:
    - /health
    - /v1/models
    - /v1/chat/completions
    - /v1/completions
